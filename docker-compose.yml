version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '4000:4000'
    depends_on:
      - mongo
      - redis
    env_file:
      - apps/api/.env
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - api
    env_file:
      - apps/web/.env.local
    restart: unless-stopped

volumes:
  mongo_data:
